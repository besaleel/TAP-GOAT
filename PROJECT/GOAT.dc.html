<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

  a{color:#3a7d2c;text-decoration:none}
  a:hover{color:#2c5f21}
  @keyframes sheetUp{from{transform:translateY(101%)}to{transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes toastPop{0%{opacity:0;transform:translate(-50%,12px)}100%{opacity:1;transform:translate(-50%,0)}}
  @keyframes welcomeIn{0%{opacity:0;transform:translate(-50%,-8px)}100%{opacity:1;transform:translate(-50%,0)}}

</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px">

      <div ref="{{ overlayRef }}" style="position:absolute;inset:0;pointer-events:none;z-index:3"></div>

        </div>

        <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:14px 20px 0">

            <div style="width:40px;height:40px;border-radius:14px;background:linear-gradient(150deg,#ffd24a,#f4a63b);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px -3px rgba(180,120,20,.6),0 1px 0 rgba(255,255,255,.5) inset;font-size:22px">🐐</div>
            <div>
              <div style="font-family:'Fredoka';font-weight:700;font-size:22px;line-height:1;color:#1e3d16;letter-spacing:.5px;text-shadow:0 1px 2px rgba(255,255,255,.5)">GOAT</div>
              <div style="font-family:'Nunito';font-weight:700;font-size:9px;letter-spacing:2.5px;color:#3a6b2c;margin-top:2px">{{ tagline }}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;pointer-events:auto">

            </button>
            <button onClick="{{ toggleLang }}" aria-label="language" style="width:40px;height:40px;border:none;border-radius:14px;background:rgba(255,255,255,.72);backdrop-filter:blur(6px);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px -3px rgba(30,60,20,.4);color:#1e3d16;font-family:'Fredoka';font-weight:600;font-size:12px">{{ lang }}</button>
            <button onClick="{{ openShare }}" aria-label="share" style="width:40px;height:40px;border:none;border-radius:14px;background:rgba(255,255,255,.72);backdrop-filter:blur(6px);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px -3px rgba(30,60,20,.4)">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1e3d16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.5l6.8-4M8.6 13.5l6.8 4"/></svg>
            </button>
          </div>
        </div>

        <sc-if value="{{ coatOpen }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;top:104px;right:20px;z-index:9;background:#fff;border-radius:16px;padding:8px;box-shadow:0 18px 40px -12px rgba(20,40,15,.45);pointer-events:auto;animation:fadeIn .15s ease;width:158px">
            <div style="font-family:'Fredoka';font-weight:600;font-size:12px;color:#7a828b;padding:2px 8px 6px">{{ coatTitle }}</div>
            <sc-for list="{{ coats }}" as="c" hint-placeholder-count="5">
              <button onClick="{{ c.onSelect }}" style="width:100%;display:flex;align-items:center;gap:11px;border:none;background:none;padding:8px 8px;border-radius:11px;cursor:pointer;font-family:'Nunito';font-weight:700;font-size:14px;color:#243a1c;text-align:left">
                <span style="width:24px;height:24px;border-radius:50%;background:{{ c.chip }};border:1px solid rgba(0,0,0,.14);flex:none;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.12) inset">
                  <sc-if value="{{ c.dot }}" hint-placeholder-val=""><span style="width:9px;height:9px;border-radius:50%;background:{{ c.dot }}"></span></sc-if>
                </span>{{ c.label }}

            </sc-for>
          </div>
        </sc-if>
        <sc-if value="{{ langOpen }}" hint-placeholder-val="{{ false }}">

                <span style="font-size:17px">{{ l.flag }}</span>{{ l.label }}
              </button>
            </sc-for>
          </div>
        </sc-if>

        <div style="position:absolute;top:96px;left:50%;transform:translateX(-50%);text-align:center;width:80%;pointer-events:none;animation:welcomeIn .5s cubic-bezier(.2,.8,.2,1)">
          <div style="display:inline-block;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);border-radius:20px;padding:10px 20px 12px;box-shadow:0 6px 20px -8px rgba(30,60,20,.4)">
            <div style="font-family:'Fredoka';font-weight:600;font-size:20px;color:#1e3d16;line-height:1.15">{{ welcomeTitle }}</div>
            <div style="font-family:'Nunito';font-weight:700;font-size:12.5px;color:#3a6b2c;margin-top:3px">{{ welcomeSub }}</div>
          </div>
        </div>

        <div style="flex:1"></div>

        <div style="padding:0 16px 12px;display:flex;flex-direction:column;gap:8px">
          <sc-if value="{{ showAds }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex;flex-direction:column;gap:7px">
              <div style="align-self:center;pointer-events:auto">
                <button onClick="{{ openPayment }}" style="border:none;background:rgba(30,45,20,.62);backdrop-filter:blur(6px);color:#fff;font-family:'Nunito';font-weight:800;font-size:12px;padding:7px 15px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 12px -4px rgba(0,0,0,.4)">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                  {{ removeAds }}
                </button>
              </div>
              <div style="pointer-events:auto;background:#fff;border-radius:18px;padding:9px 11px;display:flex;align-items:center;gap:11px;box-shadow:0 8px 24px -10px rgba(20,40,15,.5);position:relative">
                <span style="position:absolute;top:6px;left:11px;font-family:'Nunito';font-weight:800;font-size:8px;letter-spacing:1px;color:#9aa3ab">{{ adLabel }}</span>
                <div style="width:46px;height:46px;border-radius:12px;background:linear-gradient(140deg,#7ac6ff,#4a90e2);flex:none;display:flex;align-items:center;justify-content:center;font-size:24px;margin-top:4px">🚜</div>
                <div style="flex:1;min-width:0;margin-top:6px">
                  <div style="font-family:'Nunito';font-weight:800;font-size:13.5px;color:#1c2530;line-height:1.1">FazendaFácil</div>
                  <div style="font-family:'Nunito';font-weight:600;font-size:11px;color:#7a828b;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ adCopy }}</div>
                </div>
                <button style="border:none;background:#eaf6e6;color:#3a7d2c;font-family:'Nunito';font-weight:800;font-size:12px;padding:8px 15px;border-radius:999px;cursor:pointer;flex:none;margin-top:4px">{{ adCta }}</button>
              </div>
            </div>
          </sc-if>
          <div style="align-self:center;width:130px;height:5px;border-radius:3px;background:rgba(20,35,15,.4);margin-top:2px"></div>
        </div>
      </div>

      <sc-if value="{{ shareOpen }}" hint-placeholder-val="{{ false }}">
        <div onClick="{{ closeShare }}" style="position:absolute;inset:0;z-index:10;background:rgba(15,25,12,.4);animation:fadeIn .2s ease;pointer-events:auto"></div>
        <div style="position:absolute;left:0;right:0;bottom:0;z-index:11;background:#fff;border-radius:28px 28px 44px 44px;padding:22px 22px 34px;animation:sheetUp .3s cubic-bezier(.2,.9,.25,1);pointer-events:auto;box-shadow:0 -10px 40px -10px rgba(0,0,0,.3)">
          <div style="width:38px;height:5px;border-radius:3px;background:#e2e5e8;margin:0 auto 16px"></div>
          <div style="font-family:'Fredoka';font-weight:600;font-size:21px;color:#1c2530">{{ shareTitle }}</div>
          <div style="font-family:'Nunito';font-weight:600;font-size:13px;color:#7a828b;margin-top:2px">{{ shareSub }}</div>
          <div style="display:flex;gap:14px;margin:20px 0 18px">
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1"><div style="width:52px;height:52px;border-radius:16px;background:#25d366;display:flex;align-items:center;justify-content:center"><svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 00-8.5 15.3L2 22l4.8-1.5A10 10 0 1012 2zm5.6 14.2c-.2.6-1.2 1.2-1.7 1.2-.4 0-1 .2-3.3-.7-2.7-1.1-4.4-3.9-4.5-4.1-.1-.2-1.1-1.4-1.1-2.7s.7-1.9 1-2.1c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.3 0 .5l-.4.5c-.2.2-.3.4-.1.7.2.3.9 1.4 1.9 2.3 1.3 1.1 2.3 1.4 2.6 1.6.2.1.4 0 .5-.1l.8-.9c.2-.2.4-.2.6-.1l2 1c.2.1.4.2.4.3.1.2.1.6-.1 1.1z"/></svg></div><span style="font-family:'Nunito';font-weight:700;font-size:11px;color:#5a626b">WhatsApp</span></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1"><div style="width:52px;height:52px;border-radius:16px;background:#111;display:flex;align-items:center;justify-content:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M18.9 2H22l-7 8 8.3 12h-6.5l-5-6.8L5.9 22H2.8l7.5-8.6L2.3 2h6.6l4.6 6.2L18.9 2zm-1.1 18h1.8L7.3 3.8H5.4L17.8 20z"/></svg></div><span style="font-family:'Nunito';font-weight:700;font-size:11px;color:#5a626b">X</span></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1"><div style="width:52px;height:52px;border-radius:16px;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);display:flex;align-items:center;justify-content:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="#fff" stroke="none"/></svg></div><span style="font-family:'Nunito';font-weight:700;font-size:11px;color:#5a626b">Instagram</span></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1"><div style="width:52px;height:52px;border-radius:16px;background:#eef1f4;display:flex;align-items:center;justify-content:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5a626b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="4"/><path d="M9 9h6v6"/><path d="M15 9l-6 6"/></svg></div><span style="font-family:'Nunito';font-weight:700;font-size:11px;color:#5a626b">{{ more }}</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;background:#f4f6f8;border-radius:14px;padding:12px 14px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a828b" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/><path d="M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>
            <span style="flex:1;font-family:'Nunito';font-weight:700;font-size:13px;color:#3a424b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ storeUrl }}</span>
            <button onClick="{{ copyUrl }}" style="border:none;background:#1e3d16;color:#fff;font-family:'Nunito';font-weight:800;font-size:12px;padding:8px 15px;border-radius:10px;cursor:pointer">{{ copyLabel }}</button>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ paymentOpen }}" hint-placeholder-val="{{ false }}">
        <div onClick="{{ closePayment }}" style="position:absolute;inset:0;z-index:10;background:rgba(15,25,12,.4);animation:fadeIn .2s ease;pointer-events:auto"></div>
        <div style="position:absolute;left:0;right:0;bottom:0;z-index:11;background:linear-gradient(#fff,#f7fbf4);border-radius:28px 28px 44px 44px;padding:22px 22px 34px;animation:sheetUp .3s cubic-bezier(.2,.9,.25,1);pointer-events:auto;box-shadow:0 -10px 40px -10px rgba(0,0,0,.3)">
          <div style="width:38px;height:5px;border-radius:3px;background:#e2e5e8;margin:0 auto 14px"></div>
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:56px;height:56px;border-radius:18px;background:linear-gradient(150deg,#ffd24a,#f4a63b);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 6px 16px -5px rgba(200,140,20,.7)">🐐</div>
            <div>
              <div style="font-family:'Fredoka';font-weight:700;font-size:22px;color:#1e3d16;line-height:1">{{ payTitle }}</div>
              <div style="font-family:'Nunito';font-weight:700;font-size:13px;color:#3a6b2c;margin-top:3px">{{ payDesc }}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:11px;margin:20px 4px 22px">
            <sc-for list="{{ perks }}" as="p" hint-placeholder-count="3">
              <div style="display:flex;align-items:center;gap:11px">
                <div style="width:24px;height:24px;border-radius:8px;background:#e4f4dd;display:flex;align-items:center;justify-content:center;flex:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3a7d2c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 10-10"/></svg></div>
                <span style="font-family:'Nunito';font-weight:700;font-size:14px;color:#2a3a22">{{ p }}</span>
              </div>
            </sc-for>
          </div>
          <div style="text-align:center;margin-bottom:14px">
            <span style="font-family:'Fredoka';font-weight:700;font-size:34px;color:#1e3d16">{{ price }}</span>
            <span style="font-family:'Nunito';font-weight:800;font-size:13px;color:#7a9a6c;margin-left:6px">{{ oneTime }}</span>
          </div>
          <button onClick="{{ buy }}" style="width:100%;border:none;background:linear-gradient(150deg,#4caf36,#2f7d20);color:#fff;font-family:'Fredoka';font-weight:600;font-size:18px;padding:16px;border-radius:18px;cursor:pointer;box-shadow:0 10px 24px -8px rgba(45,120,20,.7)">{{ buyLabel }}</button>
          <div style="text-align:center;font-family:'Nunito';font-weight:700;font-size:11px;color:#9aa3ab;margin-top:11px">{{ payFine }}</div>
        </div>
      </sc-if>

      <sc-if value="{{ toast }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;bottom:44px;left:50%;z-index:20;background:#1e3d16;color:#fff;font-family:'Nunito';font-weight:800;font-size:13.5px;padding:12px 20px;border-radius:14px;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);animation:toastPop .3s cubic-bezier(.2,.9,.25,1);display:flex;align-items:center;gap:8px;white-space:nowrap;pointer-events:none">
          <span style="font-size:16px">🎉</span>{{ toast }}
        </div>
      </sc-if>

    </div>
  </div>
</div>
</x-dc>

  componentDidMount(){
    this._alive=true;
    import('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js')
      .then(THREE=>{ if(this._alive) this.initScene(THREE); })
      .catch(e=>console.error('three load failed',e));

  componentWillUnmount(){
    this._alive=false;
    cancelAnimationFrame(this._raf);
    if(this._ro) this._ro.disconnect();
    if(this._onPointer && this.canvasRef.current) this.canvasRef.current.removeEventListener('pointerdown',this._onPointer);
    if(this.three && this.three.renderer) this.three.renderer.dispose();

  ensureAudio(){
    if(!this.audio){ const AC=window.AudioContext||window.webkitAudioContext; if(AC) this.audio=new AC(); }
    if(this.audio && this.audio.state==='suspended') this.audio.resume();
  }

  initScene(THREE){
    const canvas=this.canvasRef.current; if(!canvas) return;
    const parent=canvas.parentElement;

    renderer.setSize(W,H,false);

    // trees
    const mkTree=(x,z,s)=>{
      const T=new THREE.Group();

      const b1=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.1,0.9,7),barkMat);

      const leaf1=new THREE.MeshStandardMaterial({color:0x4c9636,roughness:1});

    this._onPointer=(e)=>{

  makeSky(THREE){

    g.fillStyle=grad; g.fillRect(0,0,8,256);

  }

  buildGoat(THREE){
    const G=new THREE.Group();

    const spots=[];
    [[0.45,0.2,0.35],[-0.5,-0.1,-0.2],[0.2,0.45,-0.4],[-0.3,-0.35,0.4],[0.4,-0.3,-0.35],[-0.15,0.4,0.45]].forEach(p=>{
      const dir=new THREE.Vector3(p[0],p[1],p[2]).normalize().multiplyScalar(0.6);
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.22,14,12),spotMat); m.position.copy(dir); m.visible=false; m.castShadow=false; body.add(m); spots.push(m);
    });

      const hoof=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.075,0.13,8),dark); hoof.position.y=-0.76; grp.add(hoof);

    const legFL=mkLeg(-0.3,0.5), legFR=mkLeg(0.3,0.5), legBL=mkLeg(-0.3,-0.55), legBR=mkLeg(0.3,-0.55);

    // tail
    const tail=new THREE.Mesh(new THREE.ConeGeometry(0.12,0.32,8),cream); tail.position.set(0,1.15,-0.72); tail.rotation.x=0.9; G.add(tail);

    // head group (pivot at neck) — raised, longer neck like a real goat
    const head=new THREE.Group(); head.position.set(0,1.66,0.78); G.add(head);
    const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.26,0.72,14),cream); neck.position.set(0,1.36,0.6); neck.rotation.x=0.45; G.add(neck);

    const skull=new THREE.Mesh(new THREE.SphereGeometry(0.34,22,18),cream); skull.scale.set(0.82,0.95,1.05); head.add(skull);

    const nose=new THREE.Mesh(new THREE.SphereGeometry(0.09,14,12),pink); nose.scale.set(1,0.65,0.6); nose.position.set(0,-0.08,0.62); head.add(nose);
    // forehead ridge
    const brow=new THREE.Mesh(new THREE.SphereGeometry(0.2,16,12),cream); brow.scale.set(0.85,0.6,0.9); brow.position.set(0,0.18,0.14); head.add(brow);

    // jaw (opens)
    const jaw=new THREE.Group(); jaw.position.set(0,-0.26,0.18); head.add(jaw);
    const jawM=new THREE.Mesh(new THREE.SphereGeometry(0.18,16,12),cream); jawM.scale.set(0.55,0.35,1); jawM.position.set(0,-0.02,0.26); jaw.add(jawM);
    const mouth=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.04,0.3),dark); mouth.position.set(0,0.05,0.28); jaw.add(mouth);
    const tongue=new THREE.Mesh(new THREE.SphereGeometry(0.1,12,10),pink); tongue.scale.set(0.8,0.4,1.1); tongue.position.set(0,0.02,0.4); tongue.visible=false; jaw.add(tongue);
    // beard

    const amber=new THREE.MeshStandardMaterial({color:0xd8b25e,roughness:.4});
    const mkEye=(x)=>{ const e=new THREE.Mesh(new THREE.SphereGeometry(0.1,16,14),amber); e.position.set(x,0.06,0.16); e.scale.set(0.8,1,1); head.add(e);
      const p=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.045,0.1),dark); p.position.set(x>0?x+0.055:x-0.055,0.06,0.18); head.add(p); return {e,p}; };
    const L=mkEye(-0.235), R=mkEye(0.235);

    const mkEar=(x)=>{ const ear=new THREE.Group(); ear.position.set(x,0.18,-0.04);

      const inner=new THREE.Mesh(new THREE.SphereGeometry(0.1,10,8),pink); inner.scale.set(0.35,0.15,0.9); inner.position.set(x>0?0.12:-0.12,-0.055,0.05); ear.add(inner);

    const mkHorn=(x)=>{ const hg=new THREE.Group(); hg.position.set(x,0.3,-0.02);

    ground_shadow: {}

      coat:{ main:cream, second:shade, spots },

    G.position.set(0,0,0);

  applyStyle(goat){
    const p=goat.userData.parts;
    if(this.STYLE==='fofa'){
      p.head.scale.setScalar(1.42);
      p.body.scale.set(0.95,0.95,1.15); p.chest.scale.multiplyScalar(1.1); p.rump.scale.multiplyScalar(1.1);
      p.hornL.scale.setScalar(0.55); p.hornR.scale.setScalar(0.55);
      p.earL.scale.setScalar(1.2); p.earR.scale.setScalar(1.2);
      goat.scale.setScalar(0.92);
    } else if(this.STYLE==='selvagem'){
      p.hornL.scale.setScalar(1.65); p.hornR.scale.setScalar(1.65);
      p.body.scale.set(0.78,0.86,1.5); p.head.scale.setScalar(0.95);
      p.beard.scale.setScalar(1.6);
      goat.scale.setScalar(1.06);
    }
  }

  triggerCareta(intensity,sx,sy){
    const ud=this.three.goat.userData;
    ud.careta=0.9+intensity*0.7;
    ud.faceIntensity=0.55+intensity*0.9;
    this.bleat(intensity);
    this.spawnBubble(intensity,sx,sy);
  }

  updateGoat(dt){
    const g=this.three.goat, ud=g.userData, p=ud.parts;
    ud.t+=dt;
    const careta=ud.careta>0;
    // wander
    ud.turnTimer-=dt;
    if(ud.turnTimer<=0){ ud.targetHeading=Math.random()*Math.PI*2; ud.turnTimer=2+Math.random()*3.5; }
    const cx=0, cz=-0.8, R=3.4; // keep the goat inside a comfortable on-screen area
    const dist=Math.hypot(g.position.x-cx,g.position.z-cz);
    if(dist>R){ ud.targetHeading=Math.atan2(cx-g.position.x,cz-g.position.z); ud.turnTimer=1.5+Math.random()*2; }
    let dh=ud.targetHeading-ud.heading; dh=Math.atan2(Math.sin(dh),Math.cos(dh));
    ud.heading+=dh*Math.min(1,dt*1.8);
    g.rotation.y=ud.heading;
    const speed=careta?0:1.05;
    g.position.x+=Math.sin(ud.heading)*speed*dt;
    g.position.z+=Math.cos(ud.heading)*speed*dt;
    // hard clamp so it can never leave the ring
    const d2=Math.hypot(g.position.x-cx,g.position.z-cz);
    if(d2>R){ g.position.x=cx+(g.position.x-cx)/d2*R; g.position.z=cz+(g.position.z-cz)/d2*R; }

    const wk=careta?0:1;
    const ph=ud.t*9;
    p.legFL.rotation.x=Math.sin(ph)*0.55*wk;
    p.legFR.rotation.x=Math.sin(ph+Math.PI)*0.55*wk;
    p.legBL.rotation.x=Math.sin(ph+Math.PI)*0.55*wk;
    p.legBR.rotation.x=Math.sin(ph)*0.55*wk;
    g.position.y=Math.abs(Math.sin(ph))*0.04*wk;
    p.body.rotation.z=Math.sin(ph)*0.03*wk;
    p.tail.rotation.z=Math.sin(ud.t*6)*0.4;

    // face lerp
    const target=careta?1:0;
    ud.face+=(target-ud.face)*Math.min(1,dt*9);
    const f=ud.face*ud.faceIntensity;
    p.jaw.rotation.x=0.04+f*0.75;
    p.tongue.visible=f>0.2;
    p.tongue.scale.set(0.8,0.4+f*0.3,1.1+f*0.6);
    const es=0.8*(1+f*0.55), esy=1+f*0.55;
    p.eyeL.scale.set(es,esy,esy); p.eyeR.scale.set(es,esy,esy);
    p.pupilL.position.x=-0.29+f*0.09; p.pupilR.position.x=0.29-f*0.09; // cross eyes
    p.earL.rotation.x=0.3-f*0.7; p.earR.rotation.x=0.3-f*0.7;
    // head: lift chin, jiggle, turn toward camera when reacting
    const camYaw=-ud.heading;
    p.head.rotation.y=camYaw*f*0.85;
    p.head.rotation.x=-f*0.3;
    p.head.rotation.z=f*Math.sin(ud.t*32)*0.14;

    if(ud.careta>0){ ud.careta-=dt; if(ud.careta<0)ud.careta=0; }
  }

  bleat(intensity){
    const ac=this.audio; if(!ac)return;
    const now=ac.currentTime;
    const dur=0.4+intensity*0.55;
    const base=205+intensity*150;
    const master=ac.createGain(); master.gain.value=0.0001;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1300+intensity*900; lp.Q.value=0.8;
    lp.connect(master); master.connect(ac.destination);
    const osc=ac.createOscillator(); osc.type='sawtooth';
    osc.frequency.setValueAtTime(base*1.06,now);
    osc.frequency.linearRampToValueAtTime(base,now+dur*0.25);
    osc.frequency.linearRampToValueAtTime(base*0.78,now+dur);
    const osc2=ac.createOscillator(); osc2.type='triangle'; osc2.frequency.value=base*2.01;
    const g2=ac.createGain(); g2.gain.value=0.25; osc2.connect(g2); g2.connect(lp);
    // vibrato = bleaty wobble
    const lfo=ac.createOscillator(); lfo.type='sine'; lfo.frequency.value=15+intensity*9;
    const lfoG=ac.createGain(); lfoG.gain.value=base*0.14; lfo.connect(lfoG); lfoG.connect(osc.frequency); lfoG.connect(osc2.frequency);
    osc.connect(lp);
    const peak=0.16+intensity*0.34;
    master.gain.setValueAtTime(0.0001,now);
    master.gain.exponentialRampToValueAtTime(peak,now+0.035);
    master.gain.setValueAtTime(peak,now+dur*0.55);
    master.gain.exponentialRampToValueAtTime(0.0001,now+dur+0.05);
    osc.start(now); osc2.start(now); lfo.start(now);
    osc.stop(now+dur+0.1); osc2.stop(now+dur+0.1); lfo.stop(now+dur+0.1);
  }

  spawnBubble(intensity,x,y){
    const ov=this.overlayRef.current; if(!ov)return;
    const es='é'.repeat(1+Math.round(intensity*6));
    const el=document.createElement('div');
    el.textContent='Bé'+es+'!';
    const fs=15+intensity*24;
    el.style.cssText='position:absolute;left:'+x+'px;top:'+y+'px;transform:translate(-50%,-50%);font-family:Fredoka,sans-serif;font-weight:700;font-size:'+fs+'px;color:#3a2a14;background:#fff;padding:6px 14px;border-radius:16px 16px 16px 4px;box-shadow:0 8px 20px -6px rgba(30,40,15,.5);white-space:nowrap;will-change:transform,opacity';
    ov.appendChild(el);
    el.animate([{transform:'translate(-50%,-50%) scale(.4)',opacity:0},{transform:'translate(-50%,-70%) scale(1)',opacity:1,offset:.25},{transform:'translate(-50%,-160%) scale(1)',opacity:0}],{duration:900+intensity*300,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>el.remove();
    // force ripple
    const size=30+intensity*90;
    const r=document.createElement('div');
    r.style.cssText='position:absolute;left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;margin:-'+(size/2)+'px 0 0 -'+(size/2)+'px;border:3px solid rgba(255,255,255,.9);border-radius:50%;will-change:transform,opacity';
    ov.appendChild(r);
    r.animate([{transform:'scale(.2)',opacity:.9},{transform:'scale(1.6)',opacity:0}],{duration:520,easing:'ease-out'}).onfinish=()=>r.remove();
  }
}
</script>
