<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#e8ede6;font-family:'Nunito',sans-serif}
  a{color:#3a7d2c}a:hover{color:#2c5f21}
</style>
</helmet>
<section style="padding:32px">
  <div style="font-family:'Fredoka';font-weight:600;font-size:26px;color:#1e3d16;margin-bottom:4px">Versões da cabra — turno 1</div>
  <div style="font-weight:600;font-size:14px;color:#5a6b52;margin-bottom:20px">Todas interativas: toque na cabra em cada uma. <a href="#1a">1a</a> fofa · <a href="#1b">1b</a> realista (atual) · <a href="#1c">1c</a> selvagem</div>
  <div style="display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap">
    <div id="1a" style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px"><span style="background:#1e3d16;color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px">1a</span><span style="font-weight:800;color:#2a3a22">Fofa — cabeça grande, chifres curtos</span></div>
      <dc-import name="GOAT Fofa" hint-size="460px,900px" style="width:460px;height:900px"></dc-import>
    </div>
    <div id="1b" style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px"><span style="background:#1e3d16;color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px">1b</span><span style="font-weight:800;color:#2a3a22">Realista — a versão atual</span></div>
      <dc-import name="GOAT" hint-size="460px,900px" style="width:460px;height:900px"></dc-import>
    </div>
    <div id="1c" style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px"><span style="background:#1e3d16;color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px">1c</span><span style="font-weight:800;color:#2a3a22">Selvagem — chifres longos, corpo esguio</span></div>
      <dc-import name="GOAT Selvagem" hint-size="460px,900px" style="width:460px;height:900px"></dc-import>
    </div>
  </div>
</section>
</x-dc>
</body>
</html>
